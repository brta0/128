<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code128 Barcode Generator</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>
body{
    margin:0;
    padding:20px;
    background:#f4f4f4;
    font-family:Arial,sans-serif;
    text-align:center;
}

.container{
    max-width:800px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

svg{
    max-width:100%;
    background:#fff;
}

button{
    border:none;
    padding:12px 20px;
    margin:8px;
    border-radius:6px;
    background:#007bff;
    color:#fff;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}
</style>
</head>
<body>

<div class="container">

<h2>Code128 Barcode</h2>

<svg id="barcode"></svg>

<br>

<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadJPG()">Download JPG</button>

</div>

<script>

const barcodeValue = "DM253149NP739";

JsBarcode("#barcode", barcodeValue, {
    format: "CODE128",
    width: 3,
    height: 100,
    margin: 10,
    displayValue: false,
    lineColor: "#000"
});

function svgToCanvas(callback){

    const svg = document.getElementById("barcode");
    const svgData = new XMLSerializer().serializeToString(svg);

    const img = new Image();

    img.onload = function(){

        const canvas = document.createElement("canvas");

        canvas.width = img.width * 3;
        canvas.height = img.height * 3;

        const ctx = canvas.getContext("2d");

        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.scale(3,3);
        ctx.drawImage(img,0,0);

        callback(canvas);
    };

    img.src =
    "data:image/svg+xml;base64," +
    btoa(unescape(encodeURIComponent(svgData)));
}

function downloadPNG(){

    svgToCanvas(function(canvas){

        const link = document.createElement("a");

        link.download = "DM253149NP739_Code128.png";
        link.href = canvas.toDataURL("image/png");

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

    });
}

function downloadJPG(){

    svgToCanvas(function(canvas){

        const link = document.createElement("a");

        link.download = "DM253149NP739_Code128.jpg";
        link.href = canvas.toDataURL("image/jpeg",1.0);

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

    });
}

</script>

</body>
</html>
